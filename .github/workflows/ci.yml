name: Contracts and unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validators
        run: pip install openapi-spec-validator check-jsonschema
      - name: Validate OpenAPI and JSON Schemas
        run: python scripts/validate_contracts.py

  inference-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tests
        run: |
          pip install -e "libs/inference-pipeline[dev]"
          python -m pytest libs/inference-pipeline/tests/
