services:
  # Postgres with pgvector (image maintained by pgvector org)
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${LR_FF_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${LR_FF_POSTGRES_DB:-lrframeflow}
      POSTGRES_USER: ${LR_FF_POSTGRES_USER:-lrframeflow}
      POSTGRES_PASSWORD: ${LR_FF_POSTGRES_PASSWORD:-lrframeflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lrframeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "${LR_FF_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LR_FF_MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${LR_FF_MINIO_PASSWORD:-miniosecret_changeme}
    ports:
      - "${LR_FF_MINIO_PORT:-9000}:9000"
      - "${LR_FF_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Workers run as local Python processes (not in compose for now).
  # When containerised, add HEALTHCHECK like:
  #   HEALTHCHECK --interval=30s --timeout=5s --retries=3 \
  #       CMD bash -c 'test $(( $(date +%s) - $(cat /tmp/lr_ff_feature_worker.heartbeat) )) -lt 60'

volumes:
  postgres_data:
  redis_data:
  minio_data:
